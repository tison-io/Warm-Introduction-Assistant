<!DOCTYPE html>
<html>
<head>
    <title>Test Social Auth</title>
</head>
<body>
    <h1>Test Social Auth Endpoints</h1>
    <button onclick="testGoogle()">Test Google Login</button>
    <button onclick="testApple()">Test Apple Login</button>
    <button onclick="testFacebook()">Test Facebook Login</button>
    <div id="result"></div>

    <script>
        async function testSocial(provider) {
            try {
                const response = await fetch(`http://localhost:4000/founder/login/${provider}`, {
                    method: 'POST',
                });
                const data = await response.json();
                document.getElementById('result').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (err) {
                document.getElementById('result').innerHTML = `Error: ${err.message}`;
            }
        }

        function testGoogle() { testSocial('google'); }
        function testApple() { testSocial('apple'); }
        function testFacebook() { testSocial('facebook'); }
    </script>
</body>
</html>
